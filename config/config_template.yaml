# MarketScan DPP-4 to GLP-1 pipeline configuration template.
# Metadata-only: do not add row-level claims, patient IDs, dates, costs, or samples.

project:
  name: dpp4_to_glp1_switchers
  version: "0.1.0"
  environment: "IU Quartz/RED"
  metadata_manifest: "/PATH/TO/RESTRICTED_WORKSPACE/metadata/marketscan_metadata_manifest_all_years.json"

paths:
  restricted_root: "/PATH/TO/RESTRICTED_WORKSPACE"
  raw_root: "/PATH/TO/RESTRICTED_MARKETSCAN_PARQUET"
  code_list_root: "/PATH/TO/REPO/code_lists"
  input_root: "/PATH/TO/RESTRICTED_WORKSPACE/inputs"
  derived_root: "/PATH/TO/RESTRICTED_WORKSPACE/derived"
  output_root: "/PATH/TO/RESTRICTED_WORKSPACE/outputs/dpp4_to_glp1"
  log_root: "/PATH/TO/RESTRICTED_WORKSPACE/logs/dpp4_to_glp1"
  duckdb_root: "/PATH/TO/RESTRICTED_WORKSPACE/duckdb"
  tmp_root: "/PATH/TO/RESTRICTED_WORKSPACE/tmp"

study_period:
  data_years: [2017, 2018, 2019, 2020, 2021, 2022, 2023]
  index_start: "2018-01-01"
  index_end: "2022-12-31"
  baseline_months: 12
  followup_months: 12
  event_month_min: -12
  event_month_max: 12

modules:
  A:
    label: "annual_enrollment_summary"
    pattern: "mscan_{year}_a.parquet"
  D:
    label: "outpatient_pharmaceutical_claims"
    pattern: "mscan_{year}_d.parquet"
  F:
    label: "facility_header"
    pattern: "mscan_{year}_f.parquet"
  I:
    label: "inpatient_admissions"
    pattern: "mscan_{year}_i.parquet"
  O:
    label: "outpatient_services"
    pattern: "mscan_{year}_o.parquet"
  S:
    label: "inpatient_services"
    pattern: "mscan_{year}_s.parquet"
  T:
    label: "enrollment_detail"
    pattern: "mscan_{year}_t.parquet"

module_aliases:
  annual_enrollment_A: "A"
  pharmacy_D: "D"
  facility_header_F: "F"
  inpatient_I: "I"
  outpatient_O: "O"
  inpatient_services_S: "S"
  enrollment_detail_T: "T"

variables:
  common:
    enrollee_id: "ENROLID"
    year: "YEAR"
    sequence_number: "SEQNUM"
    version: "VERSION"
    family_id: "EFAMID"
    age: "AGE"
    sex: "SEX"
    region: "REGION"
    health_plan: "HLTHPLAN"
    plan_type: "PLANTYP"
    medical_coverage: "MHSACOVG"
    rx_benefit: "RX"
    data_type: "DATATYP"
    employee_relation: "EMPREL"

