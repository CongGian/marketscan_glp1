code_lists:
  drug_ndc:
    glp1: "drug_ndc/glp1_ndc.csv"
    tirzepatide: "drug_ndc/tirzepatide_ndc.csv"
    glp1_like: "drug_ndc/glp1_like_ndc.csv"
    dpp4: "drug_ndc/dpp4_ndc.csv"
    metformin: "drug_ndc/metformin_ndc.csv"
    insulin: "drug_ndc/insulin_ndc.csv"
    sglt2: "drug_ndc/sglt2_ndc.csv"
    sulfonylurea: "drug_ndc/sulfonylurea_ndc.csv"
    tzd: "drug_ndc/tzd_ndc.csv"
    other_diabetes: "drug_ndc/other_diabetes_ndc.csv"
    all_diabetes: "drug_ndc/all_diabetes_drug_ndc.csv"
  diagnosis_groups:
    acute_cvd_event: "diagnosis_groups/acute_cvd_event_icd10cm.csv"
    acute_kidney_event: "diagnosis_groups/acute_kidney_event_icd10cm.csv"
    cardiovascular_or_ascvd: "diagnosis_groups/cardiovascular_or_ascvd_icd10cm.csv"
    chronic_kidney_disease: "diagnosis_groups/chronic_kidney_disease_icd10cm.csv"
    depression_anxiety: "diagnosis_groups/depression_anxiety_icd10cm.csv"
    diabetes_any: "diagnosis_groups/diabetes_any_icd10cm.csv"
    diabetic_complications: "diagnosis_groups/diabetic_complications_icd10cm.csv"
    dka: "diagnosis_groups/dka_icd10cm.csv"
    dyslipidemia: "diagnosis_groups/dyslipidemia_icd10cm.csv"
    gallbladder_disease: "diagnosis_groups/gallbladder_disease_icd10cm.csv"
    gi_adverse_event_proxy: "diagnosis_groups/gi_adverse_event_proxy_icd10cm.csv"
    heart_failure: "diagnosis_groups/heart_failure_icd10cm.csv"
    hyperglycemia: "diagnosis_groups/hyperglycemia_icd10cm.csv"
    hypertension: "diagnosis_groups/hypertension_icd10cm.csv"
    hypoglycemia: "diagnosis_groups/hypoglycemia_icd10cm.csv"
    liver_disease: "diagnosis_groups/liver_disease_icd10cm.csv"
    obesity: "diagnosis_groups/obesity_icd10cm.csv"
    pancreatitis: "diagnosis_groups/pancreatitis_icd10cm.csv"
    sleep_apnea: "diagnosis_groups/sleep_apnea_icd10cm.csv"
    substance_use: "diagnosis_groups/substance_use_icd10cm.csv"
    type2_diabetes: "diagnosis_groups/type2_diabetes_icd10cm.csv"
    all_clinical_conditions: "diagnosis_groups/clinical_conditions_icd10cm.csv"

coding_conventions:
  ndc_source_field: "NDCNUM"
  ndc_normalized_width: 11
  ndc_preserve_leading_zeroes: true
  diagnosis_system_primary: "ICD-10-CM"
  diagnosis_decimal_free: true
  procedure_decimal_free: true
  date_encoding: "MarketScan converted parquet date fields; confirm SAS-day conversion before real-data execution."

exposure_definition:
  dpp4_preindex_lookback_days: 180
  dpp4_preindex_grace_days: 60
  glp1_washout_days: 365
  replacement_assessment_days: 120
  dpp4_postindex_grace_days: 30
  allow_transition_overlap_days: 30
  include_tirzepatide_in_primary_glp1_like: true

sample_restrictions:
  min_age: 18
  max_age: 64
  require_continuous_medical_enrollment: true
  require_continuous_rx_enrollment: true
  require_complete_12m_baseline: true
  require_complete_12m_followup: true
  exclude_prior_glp1_baseline: true
  require_dpp4_preindex_use: true

outcomes_and_mediators:
  patient_oop_components: ["COPAY", "COINS", "DEDUCT"]
  spending_fields: ["PAY", "NETPAY", "COPAY", "COINS", "DEDUCT"]
  monthly_drug_classes: ["glp1", "tirzepatide", "glp1_like", "dpp4", "metformin", "insulin", "sglt2", "sulfonylurea", "tzd", "other_diabetes"]
  baseline_conditions: ["type2_diabetes", "diabetes_any", "diabetic_complications", "obesity", "chronic_kidney_disease", "cardiovascular_or_ascvd", "heart_failure", "hypertension", "dyslipidemia", "sleep_apnea", "liver_disease", "depression_anxiety", "substance_use", "pancreatitis", "gallbladder_disease"]

outputs:
  person_month_table: "person_month_dpp4_to_glp1_switchers.parquet"
  cohort_waterfall_table: "cohort_waterfall_dpp4_to_glp1.csv"
  run_manifest: "run_manifest_dpp4_to_glp1.json"
